name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs. what actually happened?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: The exact command you ran
      render: bash
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Error output
      description: Paste the full error output or traceback
      render: text
    validations:
      required: false
  - type: dropdown
    id: subcommand
    attributes:
      label: Subcommand
      options:
        - bootstrap
        - compose
        - run
        - evolve
        - diagnose
        - music-video
        - music-analyze
        - music-plan
        - music-generate
        - music-assemble
        - other
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU model and VRAM
      placeholder: "e.g., RTX 4090 24GB"
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g., Windows 11, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g., 3.12.3"
    validations:
      required: false
